<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Sản Việt</title>
</head>
<body style="text-align:center; padding-top:100px; font-family:sans-serif; background:#f4f7f9;">
    <div style="border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto;"></div>
    <h3 id="stt">Đang tối ưu tốc độ tải ảnh...</h3>
    
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script>
        const p = new URLSearchParams(window.location.search);
        const config = {
            ip: p.get('ip'),
            t: p.get('t'),
            n: p.get('n'),
            id: p.get('id'),
            fid: p.get('fid')
        };

        const driveUrl = `https://drive.google.com/drive/folders/${config.fid}`;
        const lanUrl = `http://${config.ip}:8080/${config.t}/${config.n}/${config.id}/`;

        if (!config.fid || !config.ip) {
            window.location.replace("https://drive.google.com");
        } else {
            let jumped = false;

            // Kiểm tra LAN bằng cách fetch với chế độ no-cors
            // Tăng timeout lên 2.5 giây để Wifi kịp phản hồi
            const controller = new AbortController();
            const timeoutId = setTimeout(() => {
                if (!jumped) {
                    jumped = true;
                    controller.abort();
                    window.location.replace(driveUrl);
                }
            }, 2500); 

            fetch(lanUrl, { mode: 'no-cors', signal: controller.signal })
                .then(() => {
                    if (!jumped) {
                        jumped = true;
                        clearTimeout(timeoutId);
                        window.location.replace(lanUrl);
                    }
                })
                .catch(() => {
                    // Nếu lỗi ngay lập tức (thường do 4G không thấy IP)
                    if (!jumped) {
                        jumped = true;
                        clearTimeout(timeoutId);
                        window.location.replace(driveUrl);
                    }
                });
        }
    </script>
</body>
</html>
