<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Sản Việt</title>
</head>
<body style="text-align:center; padding-top:100px; font-family:sans-serif; background:#f4f7f9;">
    <div style="border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto;"></div>
    <h3 id="stt">Đang kết nối...</h3>
    
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script>
        // 1. Lấy thông tin từ URL
        const p = new URLSearchParams(window.location.search);
        const config = {
            ip: p.get('ip'),
            t: p.get('t'),
            n: p.get('n'),
            id: p.get('id'),
            fid: p.get('fid')
        };

        const driveUrl = `https://drive.google.com/drive/folders/${config.fid}`;
        const lanUrl = `http://${config.ip}:8080/${config.t}/${config.n}/${config.id}/`;

        // 2. Nếu thiếu dữ liệu (quét sai link), về thẳng Drive
        if (!config.fid || !config.ip) {
            window.location.replace("https://drive.google.com");
        } else {
            let jumped = false;

            // 3. Cảm biến Wifi: Thử load 1 ảnh cực nhỏ từ máy tính Nha Trang
            const checker = new Image();
            
            checker.onload = () => {
                if (!jumped) {
                    jumped = true;
                    window.location.replace(lanUrl);
                }
            };

            checker.onerror = () => {
                if (!jumped) {
                    jumped = true;
                    window.location.replace(driveUrl);
                }
            };

            // Gửi tín hiệu kiểm tra
            checker.src = lanUrl + "favicon.ico?v=" + Date.now();

            // 4. Cầu chì: Sau 1.5 giây nếu vẫn đứng im thì ép nhảy sang Drive
            setTimeout(() => {
                if (!jumped) {
                    jumped = true;
                    window.location.replace(driveUrl);
                }
            }, 1500);
        }
    </script>
</body>
</html>
