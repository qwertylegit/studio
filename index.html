<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tải Ảnh/Video - Studio</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f4f7f9; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { display: block; padding: 18px; border-radius: 12px; font-weight: bold; text-decoration: none; margin-bottom: 15px; font-size: 16px; border: none; }
        .btn-drive { background: #1a73e8; color: white; box-shadow: 0 4px 15px rgba(26,115,232,0.3); }
        .btn-lan { background: #d93025; color: white; box-shadow: 0 4px 15px rgba(217,48,37,0.3); }
        .btn span { display: block; font-size: 11px; font-weight: normal; margin-top: 4px; opacity: 0.9; }
        p { font-size: 13px; color: #7f8c8d; line-height: 1.5; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://cdn-icons-png.flaticon.com/512/3767/3767084.png" width="60" style="margin-bottom:10px;">
        <h2 style="color:#2c3e50;">Tải Video/Ảnh Của Bạn</h2>
        
        <a id="driveLink" href="#" class="btn btn-drive">DOWNLOAD WITH GOOGLE DRIVE</a>
        
        <a id="lanLink" href="#" class="btn btn-lan">
            DOWNLOAD LAN (TỐC ĐỘ CAO)
            <span>Chỉ hoạt động khi kết nối Wi-Fi Studio</span>
        </a>

        <p><b>Lưu ý:</b> Nếu bạn không ở Studio hoặc đang dùng 4G, vui lòng chọn nút <b>Google Drive</b>.</p>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const ip = p.get('ip');
        const port = p.get('port') || "8080"; // Mặc định 8080 nếu quét QR cũ
        const t = p.get('t'), n = p.get('n'), id = p.get('id'), fid = p.get('fid');

        const lanUrl = `http://${ip}:${port}/${t}/${n}/${id}/`;
        const driveUrl = `https://drive.google.com/drive/folders/${fid}`;

        document.getElementById('lanLink').href = lanUrl;
        document.getElementById('driveLink').href = driveUrl;

        // Thử tự động nhảy vào LAN
        const img = new Image();
        img.onload = () => window.location.replace(lanUrl);
        img.src = lanUrl + "?v=" + Date.now();
    </script>
</body>
</html>
