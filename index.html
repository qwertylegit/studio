<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Download - Studio</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f4f7f9; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { display: block; padding: 18px; border-radius: 15px; font-weight: bold; text-decoration: none; margin-bottom: 20px; font-size: 17px; transition: 0.2s; }
        .btn-drive { background: #1a73e8; color: white; box-shadow: 0 4px 15px rgba(26,115,232,0.3); }
        .btn-lan { background: #d93025; color: white; box-shadow: 0 4px 15px rgba(217,48,37,0.3); }
        .btn span { display: block; font-size: 11px; font-weight: normal; margin-top: 5px; opacity: 0.9; }
        p.note { font-size: 13px; color: #7f8c8d; line-height: 1.6; margin-top: 25px; }

        /* Giao diện quét QR mới */
        .scan-section {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 20px;
            border: 1px dashed #cbd5e0;
            margin-bottom: 20px;
        }
        .logo-qr { width: 50px; height: 50px; margin-right: 15px; opacity: 0.6; }
        .scan-text { text-align: left; flex: 1; }
        .scan-text b { font-size: 15px; color: #2c3e50; }
        .scan-text p { margin: 3px 0 0; font-size: 12px; color: #7f8c8d; }
        
        .btn-open-cam {
            background: #007aff;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 15px; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div id="qrView" class="hidden">
            <div class="scan-section">
                <img src="https://cdn-icons-png.flaticon.com/512/241/241528.png" class="logo-qr">
                <div class="scan-text">
                    <b>Quét mã QR</b>
                    <p>Để bắt đầu tải album</p>
                </div>
                <button class="btn-open-cam" id="btnStartScan">CAMERA</button>
            </div>
            <div id="reader"></div>
        </div>

        <div id="downloadView">
            <img src="https://cdn-icons-png.flaticon.com/512/3767/3767084.png" width="60" style="margin-bottom:15px;">
            <h2 style="color:#2c3e50; margin-bottom: 25px;">Download Video/Photo</h2>
            
            <a id="driveLink" href="#" class="btn btn-drive">DOWNLOAD WITH GOOGLE DRIVE</a>
            
            <a id="lanLink" href="#" class="btn btn-lan">
                DOWNLOAD LAN
                <span>Only with local Wi-Fi at our Studio</span>
            </a>

            <p class="note">
                <b>Note:</b> If you are not in the Studio or are using 4G, please select the button <b>Google Drive</b> blue.
            </p>
        </div>

        <div style="font-size:12px; color:#bdc3c7; margin-top: 15px;">by @Sanviet</div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const hasData = p.get('id') && p.get('fid');

        const qrView = document.getElementById('qrView');
        const downloadView = document.getElementById('downloadView');

        if (!hasData) {
            // Trường hợp VÀO TRỰC TIẾP
            qrView.classList.remove('hidden');
            downloadView.classList.add('hidden');
        } else {
            // Trường hợp CÓ DỮ LIỆU
            const port = p.get('port') || "8080";
            const lanUrl = `http://${p.get('ip')}:${port}/${p.get('t')}/${p.get('n')}/${p.get('id')}/`;
            const driveUrl = `https://drive.google.com/drive/folders/${p.get('fid')}`;

            document.getElementById('lanLink').href = lanUrl;
            document.getElementById('driveLink').href = driveUrl;

            // Thử tự động nhảy vào LAN
            const img = new Image();
            img.onload = () => window.location.replace(lanUrl);
            img.src = lanUrl + "favicon.ico?v=" + Date.now();
        }

        // --- Xử lý Camera ---
        const html5QrCode = new Html5Qrcode("reader");
        document.getElementById('btnStartScan').onclick = function() {
            this.style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    // Quét xong nhảy ngay tại tab này
                    window.location.href = decodedText;
                },
                () => {}
            ).catch(err => alert("Lỗi camera: " + err));
        };
    </script>
</body>
</html>
