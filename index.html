<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Sản Việt - Download</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 40px 20px; background: #f0f2f5; color: #333; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { color: #1a73e8; margin-bottom: 10px; font-size: 22px; }
        p { color: #666; margin-bottom: 30px; font-size: 15px; }
        
        .btn { display: block; padding: 18px; border-radius: 12px; font-weight: bold; text-decoration: none; margin-bottom: 15px; transition: all 0.3s ease; font-size: 16px; position: relative; overflow: hidden; }
        
        /* Nút LAN - Ưu tiên hàng đầu */
        .btn-lan { background: #28a745; color: white; border: none; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3); }
        .btn-lan:active { transform: scale(0.98); }
        .btn-lan span { display: block; font-size: 12px; font-weight: normal; opacity: 0.9; }

        /* Nút Drive - Tùy chọn phụ */
        .btn-drive { background: #ffffff; color: #444; border: 2px solid #dadce0; }
        .btn-drive:active { background: #f8f9fa; }

        .footer-note { font-size: 12px; color: #999; margin-top: 20px; }
        .wifi-icon { font-size: 24px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <span class="wifi-icon">📸</span>
        <h2>Tải Ảnh Của Bạn</h2>
        <p>Vui lòng chọn phương thức tải ảnh nhanh nhất</p>

        <!-- Nút Tải LAN (Nhanh nhất - Phía dưới theo yêu cầu) -->
        <a id="lanLink" href="#" class="btn btn-lan">
            DOWNLOAD NỘI BỘ (LAN)
            <span>Tốc độ cao - Chỉ dành cho Wi-Fi Studio</span>
        </a>

        <!-- Nút Tải Drive (Phía trên theo yêu cầu) -->
        <a id="driveLink" href="#" class="btn btn-drive">
            Download with Google Drive
        </a>

        <div class="footer-note">
            * Nếu dùng 4G, vui lòng chọn Google Drive.
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const config = {
            ip: p.get('ip'), t: p.get('t'), n: p.get('n'), id: p.get('id'), fid: p.get('fid')
        };

        const lanUrl = `http://${config.ip}:8080/${config.t}/${config.n}/${config.id}/`;
        const driveUrl = `https://drive.google.com/drive/folders/${config.fid}`;

        // Gán link vào các nút
        document.getElementById('lanLink').href = lanUrl;
        document.getElementById('driveLink').href = driveUrl;

        // Tự động chuyển hướng nếu phát hiện LAN cực nhanh (Optional)
        const checkLan = new Image();
        checkLan.onload = () => {
            // Chỉ tự nhảy nếu máy khách phản hồi cực nhanh trong 1 giây đầu
            window.location.replace(lanUrl);
        };
        checkLan.src = lanUrl + "?v=" + Date.now();
    </script>
</body>
</html>
