<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Nha Trang</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f4; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h3>Đang kết nối kho ảnh...</h3>
    <div class="loader"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const ip = urlParams.get('ip');
        const t = urlParams.get('t');
        const n = urlParams.get('n');
        const id = urlParams.get('id');
        const fid = urlParams.get('fid');

        const lanUrl = `http://${ip}:8080/${t}/${n}/${id}/`;
        const driveUrl = `https://drive.google.com/drive/folders/${fid}`;

        const controller = new AbortController();
        const timeout = setTimeout(() => {
            controller.abort();
            window.location.replace(driveUrl);
        }, 1500); // Thử wifi trong 1.5 giây

        fetch(lanUrl, { mode: 'no-cors', signal: controller.signal })
            .then(() => {
                clearTimeout(timeout);
                window.location.replace(lanUrl);
            })
            .catch(() => {
                window.location.replace(driveUrl);
            });
    </script>
</body>
</html>
