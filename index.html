<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Nha Trang</title>
</head>
<body style="text-align:center; padding-top:100px; font-family:sans-serif; background:#f4f7f9;">
    <div style="border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:20px auto;"></div>
    <h3 id="stt">Đang mở kho ảnh...</h3>
    
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>

    <script>
        const p = new URLSearchParams(window.location.search);
        const config = {
            ip: p.get('ip'),
            t: p.get('t'),
            n: p.get('n'),
            id: p.get('id'),
            fid: p.get('fid')
        };

        const driveUrl = `https://drive.google.com/drive/folders/${config.fid}`;
        const lanUrl = `http://${config.ip}:8080/${config.t}/${config.n}/${config.id}/`;

        let jumped = false;
        function goTo(url) {
            if (!jumped) { jumped = true; window.location.replace(url); }
        }

        // Kiểm tra xem có đang ở chung Wifi với máy tính Nha Trang không
        const checker = new Image();
        checker.onload = () => goTo(lanUrl); // Thấy máy tính -> Vào LAN
        checker.onerror = () => goTo(driveUrl); // Không thấy (4G) -> Vào Drive

        // Thử tải 1 file bất kỳ để test kết nối
        checker.src = lanUrl + "?v=" + Date.now();

        // Sau 2.5 giây nếu vẫn đứng im thì ép nhảy vào Drive
        setTimeout(() => goTo(driveUrl), 2500);
    </script>
</body>
</html>
