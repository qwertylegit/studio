<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Nha Trang</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 80px; background: #f4f7f9; color: #333; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: inline-block; margin-top: 20px; padding: 15px 25px; background: #2ecc71; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h3 id="stt">Đang kết nối Wi-Fi Studio...</h3>
    
    <!-- Nút bấm này sẽ xuất hiện nếu trình duyệt chặn tự động nhảy -->
    <div id="manual" style="display:none;">
        <p>Nếu không tự chuyển hướng, bấm nút dưới đây:</p>
        <a id="lanBtn" href="#" class="btn">XEM ẢNH TẠI STUDIO</a>
        <br><br>
        <a id="driveBtn" href="#" style="color: #888; font-size: 14px;">Xem qua Google Drive (Chậm hơn)</a>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const config = {
            ip: p.get('ip'), t: p.get('t'), n: p.get('n'), id: p.get('id'), fid: p.get('fid')
        };

        const lanUrl = `http://${config.ip}:8080/${config.t}/${config.n}/${config.id}/`;
        const driveUrl = `https://drive.google.com/drive/folders/${config.fid}`;

        document.getElementById('lanBtn').href = lanUrl;
        document.getElementById('driveBtn').href = driveUrl;

        let jumped = false;
        function goTo(url) {
            if (!jumped) { jumped = true; window.location.replace(url); }
        }

        // Thử nhảy tự động bằng thẻ Image (ít bị chặn hơn fetch)
        const checker = new Image();
        checker.onload = () => goTo(lanUrl);
        checker.onerror = () => {
            // Nếu dùng 4G, onerror sẽ kích hoạt nhanh -> Nhảy Drive
            if (navigator.connection && navigator.connection.type === 'cellular') {
                goTo(driveUrl);
            }
        };
        checker.src = lanUrl + "favicon.ico?v=" + Date.now();

        // Sau 1.5 giây nếu không nhảy được, hiện nút bấm cho khách tự nhấn
        setTimeout(() => {
            if (!jumped) {
                document.getElementById('stt').style.display = 'none';
                document.querySelector('.loader').style.display = 'none';
                document.getElementById('manual').style.display = 'block';
            }
        }, 1500);

        // Cầu chì cuối cùng: Nếu sau 5 giây khách không làm gì, tự đẩy sang Drive
        setTimeout(() => { if (!jumped) goTo(driveUrl); }, 6000);
    </script>
</body>
</html>
