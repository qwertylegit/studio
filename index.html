<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio Nha Trang</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 100px; background: #f8f9fa; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: none; padding: 12px 20px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h3 id="status">Đang kiểm tra kết nối...</h3>
    <a id="driveBtn" href="#" class="btn">Bấm vào đây để xem ảnh</a>

    <script>
        const p = new URLSearchParams(window.location.search);
        const ip = p.get('ip');
        const t = p.get('t');
        const n = p.get('n');
        const id = p.get('id');
        const fid = p.get('fid');

        const lanBase = `http://${ip}:8080/${t}/${n}/${id}/`;
        const driveUrl = `https://drive.google.com/drive/folders/${fid}`;

        // Cấu hình nút bấm dự phòng
        const btn = document.getElementById('driveBtn');
        btn.href = driveUrl;

        // Kỹ thuật "Cảm biến ảnh" để check Wifi cực nhanh
        const img = new Image();
        let redirected = false;

        // Nếu thấy máy tính (Chung Wifi)
        img.onload = function() {
            if (!redirected) {
                redirected = true;
                window.location.replace(lanBase);
            }
        };

        // Nếu KHÔNG thấy máy tính (Dùng 4G) - Lỗi này sẽ trả về rất nhanh
        img.onerror = function() {
            if (!redirected) {
                redirected = true;
                window.location.replace(driveUrl);
            }
        };

        // Thử tải một file bất kỳ từ server nội bộ (ví dụ file ảnh đã biết hoặc favicon)
        // Nếu bạn chưa có file favicon.ico, server sẽ báo 404 nhưng vẫn kích hoạt onload/onerror
        img.src = lanBase + "favicon.ico?v=" + Date.now();

        // Cầu chì cuối cùng: Sau 2.5 giây nếu vẫn đứng im thì hiện nút và nhảy Drive
        setTimeout(() => {
            if (!redirected) {
                document.getElementById('status').innerText = "Mạng yếu, vui lòng đợi...";
                btn.style.display = "inline-block";
                window.location.replace(driveUrl);
            }
        }, 2500);
    </script>
</body>
</html>
