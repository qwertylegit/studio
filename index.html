<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video/Photo Album - Studio Sản Việt</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #f4f7f9; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { display: block; padding: 18px; border-radius: 12px; font-weight: bold; text-decoration: none; margin-bottom: 15px; font-size: 16px; }
        .btn-drive { background: #1a73e8; color: white; }
        .btn-lan { background: #d93025; color: white; }
        h2 { font-size: 20px; color: #333; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>VIDEO/PHOTO ALBUM</h2>
        <a id="driveLink" href="#" class="btn btn-drive">TẢI QUA GOOGLE DRIVE</a>
        <a id="lanLink" href="#" class="btn btn-lan">TẢI TỐC ĐỘ CAO (WIFI)</a>
        <p style="font-size:12px; color:#666;">© Studio Sản Việt - Nha Trang</p>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        const port = p.get('port') || "8080";
        const lanUrl = `http://${p.get('ip')}:${port}/${p.get('t')}/${p.get('n')}/${p.get('id')}/`;
        const driveUrl = `https://drive.google.com/drive/folders/${p.get('fid')}`;
        document.getElementById('lanLink').href = lanUrl;
        document.getElementById('driveLink').href = driveUrl;
        const img = new Image();
        img.onload = () => window.location.replace(lanUrl);
        img.src = lanUrl + "?v=" + Date.now();
    </script>
</body>
</html>
